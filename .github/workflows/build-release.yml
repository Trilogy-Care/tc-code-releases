name: Build & Release

# Triggered by a v* tag (mirrored here by the private tc-code repo's Release
# workflow). Builds TC Code from the private source at that tag, publishes the
# dmg as a GitHub Release on THIS repo, refreshes appcast.json on main (served
# by GitHub Pages — the app's update feed), and bumps the Homebrew cask.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout releases repo (main)
        uses: actions/checkout@v4
        with:
          ref: main
          path: releases

      - name: Checkout private source at tag
        id: source
        env:
          SOURCE_DEPLOY_KEY: ${{ secrets.SOURCE_DEPLOY_KEY }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SOURCE_DEPLOY_KEY" > ~/.ssh/source_key
          chmod 600 ~/.ssh/source_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/source_key -o IdentitiesOnly=yes"
          # A release cut locally (Scripts/release.sh) creates this repo's tag
          # via `gh release create` without tagging the source repo — nothing
          # for CI to build then, so skip green instead of failing red.
          if ! git ls-remote --tags git@github.com:Trilogy-Care/tc-code.git "refs/tags/$TAG" | grep -q .; then
            echo "::notice::$TAG not on tc-code — locally-published release, CI build skipped."
            echo "exists=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "exists=true" >> "$GITHUB_OUTPUT"
          git clone --depth 1 --branch "$TAG" git@github.com:Trilogy-Care/tc-code.git source

      - name: Select newest Xcode
        if: steps.source.outputs.exists == 'true'
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"
          swift --version

      - name: Import Developer ID certificate (optional)
        if: steps.source.outputs.exists == 'true'
        env:
          APPLE_DEV_ID_P12: ${{ secrets.APPLE_DEV_ID_P12 }}
          APPLE_DEV_ID_P12_PASSWORD: ${{ secrets.APPLE_DEV_ID_P12_PASSWORD }}
        run: |
          if [ -z "$APPLE_DEV_ID_P12" ]; then
            echo "SIGN_IDENTITY=" >> "$GITHUB_ENV"
            echo "::notice::No Developer ID secrets — ad-hoc build, no notarization."
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          printf '%s' "$APPLE_DEV_ID_P12" | base64 -d > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$APPLE_DEV_ID_P12_PASSWORD" -T /usr/bin/codesign
          rm -f "$RUNNER_TEMP/cert.p12"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" login.keychain
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | awk -F'"' '/Developer ID Application/{print $2; exit}')"
          [ -n "$IDENTITY" ] || { echo "::error::p12 imported but no Developer ID Application identity found"; exit 1; }
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Build app + dmg
        if: steps.source.outputs.exists == 'true'
        working-directory: source
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          TC_CODE_VERSION="$VERSION" ./Scripts/bundle.sh
          if [ -n "${SIGN_IDENTITY:-}" ]; then
            # Real signature over the ad-hoc one: hardened runtime + timestamp,
            # as notarization requires.
            codesign --force --deep --options runtime --timestamp \
              -s "$SIGN_IDENTITY" "dist/TC Code.app"
            codesign --verify --deep --strict "dist/TC Code.app"
          fi
          ./Scripts/make-dmg.sh

      - name: Notarize + staple (optional)
        if: steps.source.outputs.exists == 'true'
        working-directory: source
        env:
          TAG: ${{ github.ref_name }}
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
        run: |
          if [ -z "${SIGN_IDENTITY:-}" ] || [ -z "$APPLE_NOTARY_APPLE_ID" ]; then
            echo "::notice::Notarization skipped (no identity or notary secrets)."
            exit 0
          fi
          VERSION="${TAG#v}"
          DMG="dist/TC-Code-${VERSION}.dmg"
          xcrun notarytool submit "$DMG" --wait \
            --apple-id "$APPLE_NOTARY_APPLE_ID" \
            --team-id "$APPLE_NOTARY_TEAM_ID" \
            --password "$APPLE_NOTARY_PASSWORD"
          xcrun stapler staple "$DMG"
          shasum -a 256 "$DMG"

      - name: Publish dmg as GitHub release
        if: steps.source.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          gh release create "$TAG" "source/dist/TC-Code-${VERSION}.dmg" \
            --repo "$GITHUB_REPOSITORY" \
            --title "TC Code ${VERSION}" \
            --notes "TC Code ${VERSION}. Install: \`brew install --cask trilogy-care/tc/tc-code\` — or download the dmg and drag to Applications. Ad-hoc signed: right-click → Open on first launch." \
          || gh release upload "$TAG" "source/dist/TC-Code-${VERSION}.dmg" \
               --repo "$GITHUB_REPOSITORY" --clobber

      - name: Update appcast.json (the app's update feed, via Pages)
        if: steps.source.outputs.exists == 'true'
        working-directory: releases
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/TC-Code-${VERSION}.dmg"
          ../source/Scripts/appcast-add.sh appcast.json "$VERSION" "$URL" \
            "../source/dist/TC-Code-${VERSION}.dmg"
          git config user.name "tc-code-release-bot"
          git config user.email "ops@trilogycare.com.au"
          git add appcast.json
          git commit -m "appcast: TC Code ${VERSION}"
          git push origin main

      - name: Bump Homebrew cask
        if: steps.source.outputs.exists == 'true'
        env:
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          SHA="$(shasum -a 256 "source/dist/TC-Code-${VERSION}.dmg" | cut -d' ' -f1)"
          printf '%s\n' "$TAP_DEPLOY_KEY" > ~/.ssh/tap_key
          chmod 600 ~/.ssh/tap_key
          GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_key -o IdentitiesOnly=yes" \
            git clone --depth 1 git@github.com:Trilogy-Care/homebrew-tc.git tap
          cd tap
          sed -i '' -E "s|^  version \".*\"|  version \"${VERSION}\"|" Casks/tc-code.rb
          sed -i '' -E "s|^  sha256 \".*\"|  sha256 \"${SHA}\"|" Casks/tc-code.rb
          git config user.name "tc-code-release-bot"
          git config user.email "ops@trilogycare.com.au"
          git add Casks/tc-code.rb
          git commit -m "tc-code ${VERSION}"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_key -o IdentitiesOnly=yes" \
            git push origin main
